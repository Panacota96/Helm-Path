name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Compile Python sources
        run: python -m compileall helm_path Test

      - name: Run test suite
        run: python -m pytest -q

      - name: CLI help smoke test
        run: python -m helm_path.main --help

      - name: Workspace init smoke test
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          python -m helm_path.main init "CI Competition" "Web" "Recorder" --root "$tmp_dir"
          workspace="$tmp_dir/ci-competition/web/recorder"
          test -f "$workspace/.metadata.json"
          test -f "$workspace/notes/FAILURES.md"
          test -f "$workspace/notes/WORKING_NOTES.md"
          test -d "$workspace/reports"
          test -d "$workspace/sessions"

  docker-lite:
    name: Docker Lite Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build lite image
        run: docker build -t helm-path:lite -f docker/Dockerfile.lite .
